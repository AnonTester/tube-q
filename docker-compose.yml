name: tube-q
services:
  tube-q:
    build:
      context: .
      dockerfile: Dockerfile
    image: tube-q:latest
    container_name: tube-q
    restart: unless-stopped
    ports:
      - "7090:7090"
    volumes:
      # Config directory
      - /opt/tube-q/conf:/app/conf

      # Downloads directories
      - /mnt/download/YT-DLP:/downloads
      - /media:/media
      - /mnt:/mnt

      # Optional: override binaries
      #- /usr/bin:/binaries:ro
      # Avoid bind-mounting single host ffmpeg/ffprobe binaries into this Ubuntu image:
      # the binary and shared-library versions can mismatch and fail at runtime.
      # Use container-provided ffmpeg/ffprobe (installed via Dockerfile) by default.
      #- /usr/bin/ffmpeg:/usr/bin/ffmpeg
      #- /usr/bin/ffprobe:/usr/bin/ffprobe
      # If bind-mounting ffmpeg/ffprobe binaries, use the static versions instead!

    environment:
      YT_DLP_BINARY: "/usr/bin/yt-dlp"
      FFMPEG_BINARY: "/usr/bin/ffmpeg"
      FFPROBE_BINARY: "/usr/bin/ffprobe"

    healthcheck:
      interval: 2m
      retries: 5
      start_period: 30s
      test: curl -f http://localhost:7090/health || exit 1
      timeout: 10s


# AMD/Intel GPUs:
    devices:
      - /dev/dri:/dev/dri

